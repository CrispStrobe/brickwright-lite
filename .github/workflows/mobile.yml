name: mobile

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build web bundle (vendor + integrate + webpack)
        run: bash scripts/vercel-build.sh || (echo "retrying web build" && bash scripts/vercel-build.sh)
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/scratch-gui/build
          retention-days: 3

  android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/scratch-gui/build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install app dependencies
        working-directory: apps/tauri
        run: npm ci

      - name: Build Android APK (debug, unsigned)
        working-directory: apps/tauri
        run: |
          npx tauri android init --ci
          # tauri-plugin-blec's Android library requires minSdk 26; the generated
          # project defaults to 24, which fails the manifest merge.
          sed -i 's/minSdk = 24/minSdk = 26/' src-tauri/gen/android/app/build.gradle.kts
          # Allow cleartext ws:// to LAN bridge servers (bridge-mode hardware
          # over WiFi). The manifest ships a ${usesCleartextTraffic} placeholder.
          sed -i 's/${usesCleartextTraffic}/true/' src-tauri/gen/android/app/src/main/AndroidManifest.xml
          npx tauri android build --apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: brickwright-android-apk
          path: apps/tauri/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7

      # On a tag, attach the APK to the same draft GitHub Release the desktop
      # bundles go to (release.yml), so all platforms appear together.
      - name: Attach APK to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: apps/tauri/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  ios:
    needs: build-web
    runs-on: macos-latest
    # WIP: simulator build hits a Rust/Xcode link error, and a real-device build
    # needs an Apple signing certificate + developmentTeam. Non-blocking for now.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/scratch-gui/build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      - name: Install app dependencies
        working-directory: apps/tauri
        run: npm ci

      # Build for the simulator so no Apple signing certificate is required.
      - name: Build iOS app (simulator, unsigned)
        working-directory: apps/tauri
        run: |
          npx tauri ios init --ci
          # btleplug needs CoreBluetooth for BLE, but Xcode does the final link
          # and ignores the Rust autolink hint — add the framework to the
          # xcodegen project and regenerate so the _CB* symbols resolve.
          PY=src-tauri/gen/apple/project.yml
          if ! grep -q 'CoreBluetooth.framework' "$PY"; then
            awk '{print} /- sdk: WebKit.framework/{print "      - sdk: CoreBluetooth.framework"}' "$PY" > "$PY.tmp" && mv "$PY.tmp" "$PY"
          fi
          (cd src-tauri/gen/apple && xcodegen generate)
          # Allow ws:// to LAN bridge servers (bridge-mode hardware over WiFi).
          PLIST=src-tauri/gen/apple/brickwright-tauri_iOS/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsLocalNetworking true" "$PLIST"
          npx tauri ios build --target aarch64-sim

      - uses: actions/upload-artifact@v4
        with:
          name: brickwright-ios-sim
          path: apps/tauri/src-tauri/gen/apple/build/**/*.app
          if-no-files-found: warn
          retention-days: 7
