name: tauri

on:
  push:
    paths:
      - 'apps/tauri/**'
      - '.github/workflows/tauri.yml'
  pull_request:
    paths:
      - 'apps/tauri/**'
      - '.github/workflows/tauri.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      # tauri::generate_context! validates frontendDist at compile time; the web
      # build isn't committed, so provide a minimal stub for the compile.
      - name: Stub frontendDist
        run: |
          mkdir -p ../../packages/scratch-gui/build
          echo '<!doctype html><title>ci-stub</title>' > ../../packages/scratch-gui/build/index.html

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
