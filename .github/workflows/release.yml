name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Build the web bundle once (it is identical across OSes) and share it, so the
  # per-platform Tauri jobs don't each rebuild scratch-gui (and hit its OOM 3×).
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build web bundle (vendor + integrate + webpack)
        # The webpack step OOMs marginally at times — retry once before failing.
        run: bash scripts/vercel-build.sh || (echo "retrying web build" && bash scripts/vercel-build.sh)
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: packages/scratch-gui/build
          retention-days: 3

  tauri:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Restore the prebuilt web bundle to the path tauri.conf.json's
      # frontendDist points at (repo-root packages/scratch-gui/build).
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: packages/scratch-gui/build

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf libdbus-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri

      # tauri-action runs `npm run tauri build` but does not install deps itself,
      # so the @tauri-apps/cli must be present first.
      - name: Install app dependencies (tauri CLI)
        working-directory: apps/tauri
        run: npm ci

      # Mac App Store provisioning profile: not part of tauri-action's own
      # keychain setup, so install it to the standard Xcode lookup path
      # ourselves before the build.
      - name: Install macOS provisioning profile
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.MACOS_PROVISIONING_PROFILE }}" | base64 --decode > /tmp/brickwright.provisionprofile
          PROFILE_UUID=$(security cms -D -i /tmp/brickwright.provisionprofile | plutil -extract UUID raw -)
          cp /tmp/brickwright.provisionprofile "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.provisionprofile"

      # Both identities (Distribution for the .app, Installer for the .pkg
      # below) need to be on the keychain search list for the whole job, not
      # just Tauri's own build step -- hence a persistent keychain here
      # rather than relying on any built-in ephemeral cert-import.
      - name: Import Apple certificates (persistent, for productbuild)
        if: matrix.os == 'macos-latest'
        run: |
          KEYCHAIN=$RUNNER_TEMP/brickwright-ci.keychain-db
          KEYCHAIN_PASS=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')

          echo "${{ secrets.MACOS_CERT_P12 }}" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "${{ secrets.MACOS_CERT_P12_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build the Tauri app (+ draft release on tags)
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing: NOT importing APPLE_CERTIFICATE here on purpose.
          # Tauri's own bundler would import it into a second temp keychain,
          # colliding (ambiguous identity, same name) with the persistent one
          # just set up above for productbuild. tauri.conf.json already
          # declares signingIdentity, so the bundler just needs the identity
          # findable on the keychain search list -- which it now is. Harmless
          # no-op on the ubuntu/windows matrix legs either way. No notarization
          # vars are set on purpose -- Mac App Store builds go through App
          # Review, not notarization.
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        with:
          projectPath: apps/tauri
          # On a tag push, create/append to a draft GitHub release; on manual
          # runs both are empty, so tauri-action just builds (no release).
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Brickwright {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false

      # TestFlight (and App Store submission generally) requires the
      # provisioning profile physically embedded in the .app bundle as
      # Contents/embedded.provisionprofile, not just installed where
      # codesign can find it for identity/entitlement resolution. Tauri's
      # bundler doesn't embed it, so copy it in and re-sign (embedding
      # after the original sign invalidates that signature, so this has
      # to re-seal the whole bundle). Xcode normally also merges the
      # profile's own entitlements (application-identifier,
      # com.apple.developer.team-identifier, keychain-access-groups) into
      # what gets signed; a plain codesign --entitlements <ours> doesn't,
      # so extract them from the actual profile and merge rather than
      # hardcoding the team ID a second time here.
      - name: Embed provisioning profile + re-sign
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(find apps/tauri/src-tauri/target/release/bundle/macos -name "*.app" | head -1)
          cp /tmp/brickwright.provisionprofile "$APP_PATH/Contents/embedded.provisionprofile"

          security cms -D -i /tmp/brickwright.provisionprofile \
            | plutil -extract Entitlements xml1 -o /tmp/profile-entitlements.plist -
          cp apps/tauri/src-tauri/entitlements.plist /tmp/merged-entitlements.plist
          /usr/libexec/PlistBuddy -c "Merge /tmp/profile-entitlements.plist" /tmp/merged-entitlements.plist

          codesign --force --deep --strict --timestamp --options runtime \
            --entitlements /tmp/merged-entitlements.plist \
            --sign "${{ secrets.MACOS_SIGNING_IDENTITY }}" \
            "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      # Mac App Store submission needs a .pkg installer wrapper signed with
      # the *separate* "3rd Party Mac Developer Installer" identity -- the
      # Apple Distribution identity above only covers the .app itself.
      - name: Build signed .pkg for Mac App Store submission
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH=$(find apps/tauri/src-tauri/target/release/bundle/macos -name "*.app" | head -1)
          productbuild --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer: Christian Ströbele (${{ secrets.MACOS_TEAM_ID }})" \
            apps/tauri/src-tauri/target/release/bundle/macos/Brickwright.pkg

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'macos-latest'
        with:
          name: brickwright-macos-appstore-pkg
          path: apps/tauri/src-tauri/target/release/bundle/macos/Brickwright.pkg
          if-no-files-found: warn
          retention-days: 7

      # Validate + upload to App Store Connect -- only on real version tags,
      # never on workflow_dispatch test runs (avoids spamming builds onto the
      # app record while iterating on this workflow).
      - name: Validate + upload to App Store Connect
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPSTORE_API_KEY_P8 }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

          PKG=apps/tauri/src-tauri/target/release/bundle/macos/Brickwright.pkg
          BUNDLE_VERSION=$(node -p "require('./apps/tauri/src-tauri/tauri.conf.json').version")

          xcrun altool --validate-app -f "$PKG" \
            --type macos \
            --api-key ${{ secrets.APPSTORE_API_KEY_ID }} \
            --api-issuer ${{ secrets.APPSTORE_API_ISSUER_ID }}

          xcrun altool --upload-package "$PKG" \
            --type macos \
            --apple-id ${{ vars.APPSTORE_APP_ID }} \
            --bundle-id com.crispstrobe.brickwright \
            --bundle-version "$BUNDLE_VERSION" \
            --bundle-short-version-string "$BUNDLE_VERSION" \
            --api-key ${{ secrets.APPSTORE_API_KEY_ID }} \
            --api-issuer ${{ secrets.APPSTORE_API_ISSUER_ID }}

      # Also expose the bundles as workflow artifacts (useful for manual runs).
      - uses: actions/upload-artifact@v4
        with:
          name: brickwright-${{ matrix.os }}
          path: apps/tauri/src-tauri/target/release/bundle/**
          if-no-files-found: warn
          retention-days: 7
